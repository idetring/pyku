  eobs_mask:
    description: >

      Mask for the usage of E-OBS data in anlyses like pyku.ana.mean_vs_time.
      It was generated using E-OBS v27.0 ensemble mean data at 0.1 deg
      resolution. It is the minimum overlap of valid data of all available
      variables, averaged over the year 1979.

      REFERENCES

      * https://www.ecad.eu/download/ensembles/download.php
      *  Cornes, R. C., van der Schrier, G., van den Besselaar, E. J. M., & Jones, P. D. (2018).
         An ensemble version of the E-OBS temperature and precipitation data sets.
         JGR: Atmospheres, 123, 9391-9409. https://doi.org/10.1029/2017JD028200
    base_url: null
    archive_file: null
    target_file: "eobs_mask.geojson.zip"
    query: null

  prudence:
    description: >

      Prudence polygons, used in climatology, are spatial divisions developed
      during the PRUDENCE project (Prediction of Regional scenarios and
      Uncertainties for Defining EuropeaN Climate change risks and Effects).
      These polygons are defined to represent consistent and climatically
      homogeneous regions across Europe, facilitating regional climate change
      analyses. They are widely used for studying the impacts of climate models
      at sub-continental scales and are essential for evaluating regional
      climate projections under various scenarios. The polygons provide a
      framework for aggregating climate model data, aiding in the comparison of
      regional impacts under different climate conditions. These regions
      correspond to specific areas that experience similar climatic patterns
      and help in better understanding variability and extreme events under
      modeled and observed datasets.

      REFERENCES

      * https://ensemblesrt3.dmi.dk/quicklook/regions.html
      * https://www.wcrp-climate.org/modelling-wgcm-mip-catalogue/modelling-wgcm-mips-2/288-modelling-wgcm-catalogue-prudence
      * Christensen, J.H., Christensen, O.B. A summary of the PRUDENCE model
        projections of changes in European climate by the end of this century.
        Climatic Change 81 (Suppl 1), 7-30 (2007).
        https://doi.org/10.1007/s10584-006-9210-7

    base_url: null
    archive_file: null
    target_file: "prudence.geojson.zip"
    query: null

  natural_areas_of_germany:
    description: Not documented
    base_url: null
    archive_file: null
    target_file: "Regionen_NationalerKlimareport_2015_Namen.geojson.zip"
    query: null

  natural_areas_of_germany_merged4:
    description: >
        Natural areas of Germany divided into western, northern, eastern and
        southern states.

        Western  - Linksrheinische Mittelgebirge, Oberrheinisches Tiefland,
                   Rechtsrheinische Mittelgebirge, Westdeutsche Tieflandsbucht
        Northern - Nordostdeutsches Tiefland, Nordwestdeutsches Tiefland
        Eastern  - Oestliche Mittelgebirge, Ostdeutsche Becken und Huegel,
                   Zentrale Mittelgebirge und Harz
        Southern - Suedwestdeutsche Mittelgebirge, Alpen, Alpenvorland

        These polygons are built on-the-fly from Natural Areas of Germany data
        available in pyku. See the source code in resources.py
    base_url: null
    archive_file: null
    target_file: null
    query: null

